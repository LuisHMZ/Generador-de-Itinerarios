{% load static %}

{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>
        Página no encontrada - MexTur
    </title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CORRECCIÓN 1: Importar correctamente los Iconos -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="{% static 'css/index.css' %}">
    <link rel="stylesheet" href="{% static 'css/header-footer.css' %}">
    <link rel="stylesheet" href="{% static 'css/feed.css' %}">
    <link rel="stylesheet" href="{% static 'css/profile.css' %}">

    <link rel="icon" href="{% static 'img/logo.png' %}" type="image/png">

    <style>
        /* Estilo simple para las estrellas interactivas */
        .star-rating-widget .bi-star,
        .star-rating-widget .bi-star-fill {
            cursor: pointer;
            transition: color 0.2s;
        }

        .star-rating-widget .bi-star:hover,
        .star-rating-widget .bi-star-fill:hover {
            color: #ffc107 !important;
            /* Amarillo al pasar el mouse */
        }

        /* --- AJUSTE DEL MODAL (Para que abrace la imagen) --- */
        .modal-facebook .modal-dialog {
            width: fit-content !important;
            /* Se ajusta al contenido */
            max-width: 95vw !important;
            /* Pero no se pasa del ancho de pantalla */
            margin: 1.5rem auto;
        }

        .modal-facebook .modal-content {
            width: 100%;
            max-width: 600px;
            /* Ancho máximo de la tarjeta */
            margin: 0 auto;
            /* Centrado */
            border-radius: 16px;
            border: none;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
        }
    </style>
</head>

<body>
    {% include 'snippets/header.html' %}
    <main>
        <div class="container d-flex flex-column justify-content-center align-items-center py-5"
            style="min-height: 70vh;">

            <div class="mb-4 text-primary animate__animated animate__bounceIn">
                <i class="fas fa-map-signs fa-6x"></i>
            </div>

            <h1 class="display-1 fw-bold text-dark">404</h1>
            <h2 class="h4 mb-4 text-muted">¡Ups! Nos hemos perdido del mapa.</h2>

            <p class="lead text-muted text-center mb-5" style="max-width: 600px;">
                La página que buscas no existe, ha sido movida o la dirección es incorrecta.
            </p>

            <div class="d-flex gap-3">
                <button onclick="history.back()" class="btn btn-outline-secondary btn-lg px-4">
                    <i class="fas fa-undo me-2"></i>Volver
                </button>

                <a href="/" class="btn btn-primary btn-lg px-4">
                    <i class="fas fa-compass me-2"></i>Ir al Inicio
                </a>
            </div>

        </div>
    </main>

    {% include 'snippets/footer.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/headerFooter.js' %}" defer></script>

</body>

</html>
