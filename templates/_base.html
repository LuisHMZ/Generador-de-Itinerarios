{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- El título puede ser dinámico -->
    <title>{% block title %}MexTur{% endblock %}</title>

    <!-- Bootstrap CSS (CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome (CDN) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/header-footer.css' %}">
    <link rel="icon" href="{% static 'img/logo.png' %}" type="image/png">
    <!-- Tus estilos CSS -->
    <link rel="stylesheet" href="{% static 'css/index.css' %}">
    {% block extra_css %}{% endblock %} <!-- Para CSS adicional por página -->
</head>
<body>
    <!-- Header (Navbar) -->
    <div id="site-header"></div>

    <!-- Contenido Principal (Será reemplazado por cada página hija) -->
    <main class="container my-5">
        {% block content %}
        <!-- El contenido específico de la página irá aquí -->
        {% endblock %}
    </main>

    <!-- Footer -->
    <div id="site-footer"></div>

    <!-- Bootstrap JS (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/user_itineraries.js' %}" defer></script>
    <script src="{% static 'js/headerFooter.js' %}" defer></script>
    <!-- Tus Scripts JS -->
    {% block extra_js %}{% endblock %} <!-- Para JS adicional por página -->
</body>
</html>
