<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
/    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse - MexTur</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./css/index.css">

</head>
<body>
    <!-- Header -->
    <div id="site-header"></div>

    <!-- Main Content -->
    <div class="container my-5">
        <div class="container-register">
            <h1 class="register-title">Únete para acceder a lo mejor de MexTur</h1>
            <p class="register-subtitle">Descubre los destinos más increíbles de México</p>
            
            <!-- Alertas personalizadas -->
            <div id="alert-success" class="alert-custom alert-success-custom">
                <i class="fas fa-check-circle me-2"></i>
                <span id="success-message"></span>
            </div>

            <div id="alert-error" class="alert-custom alert-error-custom">
                <i class="fas fa-exclamation-circle me-2"></i>
                <span id="error-message"></span>
            </div>
            
            <form id="register-form" novalidate>
    <div class="row">
        <div class="col-md-6">
            <div class="form-group">
                <label for="nombre-input" class="form-label">Nombre</label>
                <input type="text" name="nombre" id="nombre-input" class="form-control" placeholder="Escribe tu nombre" required>
                <span class="error-msg"></span>
            </div>
        </div>
        <div class="col-md-6">
            <div class="form-group">
                <label for="primer-apellido-input" class="form-label">Apellido</label>
                <input type="text" name="primer-apellido" id="primer-apellido-input" class="form-control" placeholder="Escribe tu apellido" required>
                <span class="error-msg"></span>
            </div>
        </div>
    </div>

    <div class="form-group">
        <label for="fecha-nacimiento-input" class="form-label">Fecha de nacimiento</label>
        <input type="date" name="fecha-nacimiento" id="fecha-nacimiento-input" class="form-control" required>
        <span class="error-msg"></span>
    </div>

    <div class="form-group">
        <label for="correo-input" class="form-label">Dirección de correo electrónico</label>
        <input type="email" name="correo" id="correo-input" class="form-control" placeholder="Escribe tu correo electrónico" required>
        <span class="error-msg"></span>
    </div>

    <div class="form-group">
        <label for="contraseña-input" class="form-label">Contraseña</label>
        <div class="input-icon">
            <input type="password" name="contraseña" id="contraseña-input" class="form-control" placeholder="Escribe tu contraseña" required>
            <i class="fas fa-eye password-toggle" id="toggle-password"></i>
        </div>
        <span class="error-msg"></span>
    </div>

    <div class="form-group">
        <label for="confirmar-contraseña-input" class="form-label">Repite tu contraseña</label>
        <div class="input-icon">
            <input type="password" name="confirmar-contraseña" id="confirmar-contraseña-input" class="form-control" placeholder="Escribe tu contraseña de nuevo" required>
            <i class="fas fa-eye password-toggle" id="toggle-confirm-password"></i>
        </div>
        <span class="error-msg"></span>
    </div>

    <!-- Checkbox de consentimiento -->
    <div class="form-check mb-3">
        <input type="checkbox" id="consent-checkbox" class="form-check-input">
        <label for="consent-checkbox" class="form-check-label">
            Sí, acepto los términos y condiciones y la política de privacidad.
        </label>
    </div>

    <!--Botón principal (inicialmente deshabilitado) -->
    <button type="submit" class="btn btn-register" id="submit-btn" disabled>
        <span>Unirse</span>
    </button>

    <!-- Separador visual -->
    <div class="text-center mt-3 mb-2">
        <span class="text-muted">O continúa con</span>
    </div>

    <!-- Botones sociales -->
    <div class="d-grid gap-2">
        <button type="button" class="btn btn-social btn-google">
            <i class="fab fa-google me-2"></i> Continuar con Google
        </button>
        <button type="button" class="btn btn-social btn-facebook">
            <i class="fab fa-facebook-f me-2"></i> Continuar con Facebook
        </button>
    </div>

    <p class="login-link mt-4 text-center">
        ¿Ya tienes una cuenta? <a href="log.html">Inicia sesión</a>
    </p>
</form>

            
        </div>
    </div>

    <!-- Footer -->
    <div id="site-footer"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/headerFooter.js' %}" defer></script>
    
    <!-- Custom JS -->
    <script src="./js/scriptIndex.js"></script>

</body>
</html>
