<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="preload" href="css/styles.css" as="style">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/app.js" type="text/javascript" defer></script>
</head>
<body>
    <div class="container">
        <h1>Recuperar contraseña</h1>
        <p id="mensaje-errores"></p>
        <div>
            <h2>Ingresa tu correo electrónico para reestablecer tu contraseña</h2>
        </div>
        <form id="form">
            <div>
                <label for="correo-input">Dirección de correo electrónico</label>
                <input type="email" name="correo" id="correo-input" placeholder="Escribe tu correo electrónico">
            </div>
            <button type="submit">Reestablecer</button>
        </form>
        <p>¿Recordaste tu contraseña? <a href="login.html">Inicia sesión</a></p>
    </div>
    
</body>
</html>
