<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="preload" href="css/styles.css" as="style">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/app.js" type="text/javascript" defer></script>
</head>
<body>
    <div class="container">
        <h1>Únete para acceder a lo mejor de MexTur</h1>
        <p id="mensaje-errores"></p>
        <form id="form">
            <div>
                <label for="nombre-input">Nombre</label>
                <input type="text" name="nombre" id="nombre-input" placeholder="Escribe tu nombre">
            </div>
            <div>
                <label for="apellido-input">Apellido</label>
                <input type="text" name="apellido" id="apellido-input" placeholder="Escribe tu apellido">
            </div>
            <div>
                <label for="fecha-nacimiento-input">Fecha de nacimiento</label>
                <input type="date" name="fecha-nacimiento" id="fecha-nacimiento-input" placeholder="Fecha de nacimiento">
            </div>
            <div>
                <label for="correo-input">Dirección de correo electrónico</label>
                <input type="email" name="correo" id="correo-input" placeholder="Escribe tu correo electrónico">
            </div>
            <div>
                <label for="contraseña-input">Contraseña</label>
                <input type="password" name="contraseña" id="contraseña-input" placeholder="Escribe tu contraseña">
            </div>
            <div>
                <label for="confirmar-contraseña-input">Confirma tu contraseña</label>
                <input type="password" name="confirmar-contraseña" id="confirmar-contraseña-input" placeholder="Escribe tu contraseña de nuevo">
            </div>
            <button type="submit">Unirse</button>
        </form>
        <p>¿Ya tienes una cuenta? <a href="login.html">Inicia sesión</a></p>
    </div>
    
</body>
</html>
